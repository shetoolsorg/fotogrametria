name: asalaises-data-services

services:
  metabase-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: metabase
      POSTGRES_USER: metabase
      POSTGRES_PASSWORD: ${MB_PG_PASSWORD:-change_me_strong}
    volumes:
      - metabase-pgdata:/var/lib/postgresql/data
    # Optional: only expose if you need to connect from outside Docker
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metabase -d metabase"]
      interval: 10s
      timeout: 5s
      retries: 10

  metabase:
    image: metabase/metabase:latest
      #platform: linux/arm64
    restart: unless-stopped
    depends_on:
      metabase-postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: metabase
      MB_DB_PASS: ${MB_PG_PASSWORD:-change_me_strong}
      MB_DB_HOST: metabase-postgres
      MB_TIMEZONE: America/Mexico_City
      MB_SITE_URL: "https://salaisesmb.prox.one"
    volumes:
      - /dev/urandom:/dev/random:ro
      - /home/ubuntu/fotogrametria/scripts/metabase_data:/qfc
    ports:
      - "${METABASE_PORT:-3000}:3000"

  mongo:
    image: mongodb/mongodb-community-server
    restart: unless-stopped
      #ports:
      #- "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongo-dummy:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --eval 'db.adminCommand({ ping: 1 })' || mongo --eval 'db.adminCommand({ ping: 1 })'"]
      interval: 15s
      timeout: 10s
      retries: 10

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    restart: unless-stopped
    ports:
      - "${TT_PORT:-8000}:80"
    volumes:
      - "${DATA_PATH:-/opt/asalaises}/titiler/data:/data"

  mapserver:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${MAP_PORT:-8090}:80"
    volumes:
      - "${DATA_PATH:-/opt/asalaises}/map/html:/usr/share/nginx/html:ro"
      #- "${DATA_PATH:-/opt/asalaises}/map/map.conf:/etc/nginx/conf.d/default.conf:ro"
  fotogrametria-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fotogrametria-api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URL: mongodb://mongo:27017
      MONGODB_DB: metrics
      API_KEY: 949ff184aedcde3a42399ed2c537ec2f3af3f34
      DATA_ROOT: /data
      TITILER_BASE_URL: http://titiler
    volumes:
      - "${DATA_PATH:-/opt/asalaises}:/data"
    ports:
      - "${ANALYSIS_API_PORT:-8015}:8000"
    command: >
      uvicorn app.app:app --host 0.0.0.0 --port 8000
volumes:
  mongo-dummy:
    driver: local
  metabase-pgdata:
    driver: local

